name: CI

on:
  push:
    branches: [main, develop, "copilot/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Type-check, Test & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Minimal env vars needed for Next.js to build without a real DB
      DATABASE_URL: "postgresql://user:pass@localhost:5432/along_test"
      DIRECT_URL: "postgresql://user:pass@localhost:5432/along_test"
      NEXTAUTH_SECRET: "ci-secret-not-real"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      UPSTASH_REDIS_REST_URL: "https://fake.upstash.io"
      UPSTASH_REDIS_REST_TOKEN: "fake-token"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --passWithNoTests --ci --forceExit

      - name: Lint
        run: npx next lint --max-warnings 0
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: "1"
