<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Share Route — Along</title>
  <link rel="stylesheet" href="css/along.css">
  <style>
    .srm-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      display: grid;
      place-items: center;
      z-index: 1000;
      padding: 24px;
    }
    .srm-modal {
      background: var(--bg-base);
      border-radius: var(--radius-xl);
      width: 100%;
      max-width: 640px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }
    .srm-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg-base);
      z-index: 10;
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    }
    .srm-header h2 { font-size: 20px; font-weight: 700; }
    .srm-header .close-btn {
      width: 36px; height: 36px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      border-radius: 50%;
      display: grid;
      place-items: center;
      cursor: pointer;
    }
    .srm-header .close-btn:hover { background: var(--bg-elevated); }
    .srm-body { padding: 24px; display: flex; flex-direction: column; gap: 24px; }
    .srm-field { display: flex; flex-direction: column; gap: 6px; }
    .srm-field label { font-size: 13px; font-weight: 600; }
    .srm-section-title { font-size: 15px; font-weight: 600; }
    .srm-section-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .srm-steps { display: flex; flex-direction: column; gap: 12px; }
    .srm-step {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
    }
    .srm-step .step-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .srm-step .step-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .srm-step .step-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
    .srm-step .step-input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-base);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    .srm-step .step-input:focus { border-color: var(--primary); }
    .srm-step .step-row {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      align-items: flex-start;
    }
    .srm-step .vehicle-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .srm-step .vehicle-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius-full);
      border: 1.5px solid var(--border);
      background: var(--bg-base);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .srm-step .vehicle-chip:hover { border-color: var(--primary); color: var(--primary); }
    .srm-step .vehicle-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .srm-step .vehicle-chip svg { width: 16px; height: 16px; }
    .srm-step .fare-input {
      width: 140px;
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-base);
      color: var(--text-primary);
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    .srm-step .fare-input:focus { border-color: var(--primary); }
    .srm-add-stop {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-lg);
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .srm-add-stop:hover { border-color: var(--primary); color: var(--primary); }
    .srm-map {
      width: 100%;
      height: 220px;
      border-radius: var(--radius-lg);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .srm-map .grid {
      position: absolute; inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.5;
    }
    .srm-map .polyline {
      position: absolute; inset: 0;
    }
    .srm-marker {
      position: absolute;
      width: 28px; height: 28px;
      display: grid;
      place-items: center;
    }
    .srm-marker .dot {
      width: 24px; height: 24px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      border: 2px solid #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }
    .srm-marker .dot.green { background: var(--primary); }
    .srm-marker .dot.white { background: #fff; color: var(--primary); border-color: var(--primary); }
    .srm-marker .dot.dark { background: #003d23; }
    .srm-m1 { top: 15%; left: 15%; }
    .srm-m2 { top: 42%; left: 55%; }
    .srm-m3 { bottom: 18%; left: 30%; }
    .srm-coach {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .srm-coach .ch-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--bg-elevated);
      cursor: pointer;
    }
    .srm-coach .ch-top .ch-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
    }
    .srm-coach .ch-top .ch-title svg { width: 18px; height: 18px; color: var(--primary); }
    .srm-coach .ch-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .srm-coach .ch-body.hidden { display: none; }
    .srm-coach .progress { display: flex; flex-direction: column; gap: 6px; }
    .srm-coach .progress .plabel { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); }
    .srm-coach .progress .track { height: 6px; background: var(--border); border-radius: 999px; overflow: hidden; }
    .srm-coach .progress .track .fill { height: 100%; border-radius: 999px; background: var(--primary-light); }
    .srm-coach .tip {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 12px;
      background: rgba(0,168,98,0.06);
      border: 1px solid rgba(0,168,98,0.15);
      border-radius: var(--radius-md);
      font-size: 12px;
      color: var(--text-secondary);
    }
    .srm-coach .tip svg { width: 16px; height: 16px; color: var(--primary); flex-shrink: 0; margin-top: 1px; }
    .srm-footer {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--bg-base);
      border-radius: 0 0 var(--radius-xl) var(--radius-xl);
    }
    .srm-footer .btn { padding: 10px 24px; }
  </style>
</head>
<body>
  <div class="screen-header">
    <a href="index.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back
    </a>
    <h2>Share Route Modal</h2>
    <div class="theme-toggle">
      <button class="active" onclick="setTheme('light')" aria-label="Light mode">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
      <button onclick="setTheme('dark')" aria-label="Dark mode">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>

  <div style="display:grid;place-items:center;min-height:calc(100vh - 56px);padding:24px">
    <div class="srm-backdrop" style="position:relative;padding:0;background:transparent;backdrop-filter:none;display:block">
      <div class="srm-modal">
        <div class="srm-header">
          <h2>Share Route</h2>
          <button class="close-btn" onclick="window.location.href='index.html'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="srm-body">
          <div class="srm-field">
            <label for="srm-title">Route Title</label>
            <input id="srm-title" class="step-input" value="Lagos Island to VI alternative route" placeholder="Give your route a name">
          </div>

          <div>
            <div class="srm-section-title">Route Stops</div>
            <div class="srm-section-sub">Add stops along your route</div>
          </div>

          <div class="srm-steps">
            <div class="srm-step">
              <div class="step-top">
                <div class="step-num">1</div>
                <span class="step-label">Starting point</span>
              </div>
              <input class="step-input" value="Lagos Island" placeholder="Starting point">
              <div class="step-row">
                <div class="vehicle-chips">
                  <button class="vehicle-chip active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 16H9m10 0h3v-3.15a1 1 0 0 0-.84-.99L16 11l-2.7-3.6a1 1 0 0 0-.8-.4H5.24a2 2 0 0 0-1.8 1.1l-.8 1.63A6 6 0 0 0 2 12.42V16h2"/><circle cx="6.5" cy="16.5" r="2.5"/><circle cx="16.5" cy="16.5" r="2.5"/></svg>
                    Car
                  </button>
                  <button class="vehicle-chip">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v7h6V6z"/><path d="M3 17h2.5M18.5 17H21"/></svg>
                    Bike
                  </button>
                  <button class="vehicle-chip">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="14" rx="2"/><path d="M3 10h18"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
                    Bus
                  </button>
                </div>
                <input class="fare-input" value="₦0" placeholder="₦0" style="margin-left:auto">
              </div>
            </div>

            <div class="srm-step">
              <div class="step-top">
                <div class="step-num">2</div>
                <span class="step-label">Stop</span>
              </div>
              <input class="step-input" value="Marina" placeholder="Stop location">
              <div class="step-row">
                <div class="vehicle-chips">
                  <button class="vehicle-chip">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 16H9m10 0h3v-3.15a1 1 0 0 0-.84-.99L16 11l-2.7-3.6a1 1 0 0 0-.8-.4H5.24a2 2 0 0 0-1.8 1.1l-.8 1.63A6 6 0 0 0 2 12.42V16h2"/><circle cx="6.5" cy="16.5" r="2.5"/><circle cx="16.5" cy="16.5" r="2.5"/></svg>
                    Car
                  </button>
                  <button class="vehicle-chip active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v7h6V6z"/><path d="M3 17h2.5M18.5 17H21"/></svg>
                    Bike
                  </button>
                  <button class="vehicle-chip">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="14" rx="2"/><path d="M3 10h18"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
                    Bus
                  </button>
                </div>
                <input class="fare-input" value="₦200-₦300" placeholder="₦0" style="margin-left:auto">
              </div>
            </div>

            <div class="srm-step">
              <div class="step-top">
                <div class="step-num">3</div>
                <span class="step-label">Destination</span>
              </div>
              <input class="step-input" value="VI" placeholder="Destination">
              <div class="step-row">
                <div class="vehicle-chips">
                  <button class="vehicle-chip">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 16H9m10 0h3v-3.15a1 1 0 0 0-.84-.99L16 11l-2.7-3.6a1 1 0 0 0-.8-.4H5.24a2 2 0 0 0-1.8 1.1l-.8 1.63A6 6 0 0 0 2 12.42V16h2"/><circle cx="6.5" cy="16.5" r="2.5"/><circle cx="16.5" cy="16.5" r="2.5"/></svg>
                    Car
                  </button>
                  <button class="vehicle-chip">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v7h6V6z"/><path d="M3 17h2.5M18.5 17H21"/></svg>
                    Bike
                  </button>
                  <button class="vehicle-chip active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="14" rx="2"/><path d="M3 10h18"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
                    Bus
                  </button>
                </div>
                <input class="fare-input" value="₦500" placeholder="₦0" style="margin-left:auto">
              </div>
            </div>
          </div>

          <button class="srm-add-stop">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add stop
          </button>

          <div>
            <div class="srm-section-title" style="margin-bottom:6px">Route Preview</div>
            <div class="srm-map">
              <div class="grid"></div>
              <svg class="polyline" viewBox="0 0 592 220" fill="none">
                <polyline points="110,35 170,95 440,140" stroke="var(--primary-light)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <circle cx="110" cy="35" r="5" fill="var(--primary)"/>
                <circle cx="170" cy="95" r="5" fill="var(--primary)"/>
                <circle cx="440" cy="140" r="5" fill="#003d23"/>
              </svg>
              <div class="srm-marker srm-m1"><div class="dot green">1</div></div>
              <div class="srm-marker srm-m2"><div class="dot white">2</div></div>
              <div class="srm-marker srm-m3"><div class="dot dark">3</div></div>
            </div>
          </div>

          <div class="srm-coach">
            <div class="ch-top" onclick="const b=this.nextElementSibling;b.classList.toggle('hidden');const c=this.querySelector('.chevron');c.style.transform=b.classList.contains('hidden')?'rotate(0deg)':'rotate(180deg')">
              <div class="ch-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Drafting Coach
              </div>
              <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transition:transform 0.2s;transform:rotate(180deg)"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="ch-body">
              <div class="progress">
                <div class="plabel"><span>Quality score</span><span>75%</span></div>
                <div class="track"><div class="fill" style="width:75%"></div></div>
              </div>
              <div class="tip">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                <span>Add more detail to improve visibility — include landmarks, traffic tips, and exact fares.</span>
              </div>
            </div>
          </div>
        </div>

        <div class="srm-footer">
          <button class="btn btn-ghost" onclick="window.location.href='index.html'">Save Draft</button>
          <button class="btn btn-primary" onclick="alert('Route shared!')">Share Route</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function setTheme(theme) {
      document.documentElement.className = theme === 'dark' ? 'dark' : '';
      document.querySelectorAll('.theme-toggle button').forEach((b,i) => {
        b.className = (theme === 'light' && i === 0) || (theme === 'dark' && i === 1) ? 'active' : '';
      });
      localStorage.setItem('along-theme', theme);
    }
    (function(){
      var saved = localStorage.getItem('along-theme');
      if (saved === 'dark') setTheme('dark');

      document.querySelectorAll('.vehicle-chip').forEach(function(chip) {
        chip.addEventListener('click', function() {
          var parent = this.closest('.srm-step');
          parent.querySelectorAll('.vehicle-chip').forEach(function(c) { c.classList.remove('active'); });
          this.classList.add('active');
        });
      });
    })();
  </script>
</body>
</html>
