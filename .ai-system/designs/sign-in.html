<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Sign In — Along</title>
  <link rel="stylesheet" href="css/along.css">
  <style>
    .si-page { min-height: 100vh; display: flex; flex-direction: column; background: var(--bg-base); }
    .si-topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px var(--gutter-mobile); }
    .si-topbar .back-link { color: var(--text-secondary); text-decoration: none; display: flex; align-items: center; gap: 4px; font-size: 13px; }
    .si-topbar .back-link:hover { color: var(--primary); }
    .si-body { flex: 1; display: flex; flex-direction: column; padding: 20px var(--gutter-mobile) 40px; }
    .si-body .logo { font-size: 36px; font-weight: 800; color: var(--primary); text-align: center; letter-spacing: -0.02em; }
    .si-body .heading { font-size: 22px; font-weight: 700; text-align: center; margin-top: 24px; }
    .si-body .subtitle { font-size: 14px; color: var(--text-secondary); text-align: center; margin-top: 4px; }
    .si-form { margin-top: 32px; display: flex; flex-direction: column; gap: 18px; }
    .si-form .field { display: flex; flex-direction: column; gap: 6px; }
    .si-form .field label { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .si-form .input-wrap { position: relative; }
    .si-form .input-wrap .input { padding-right: 40px; }
    .si-form .input-wrap .toggle-vis { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; display: grid; place-items: center; }
    .si-form .input-wrap .toggle-vis:hover { color: var(--text-secondary); }
    .si-form .btn-primary { width: 100%; padding: 14px; font-size: 16px; border-radius: var(--radius-sm); }
    .si-divider { display: flex; align-items: center; gap: 12px; margin-top: 24px; }
    .si-divider::before, .si-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .si-divider span { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
    .si-google { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-base); color: var(--text-primary); font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; margin-top: 16px; transition: background 0.15s; }
    .si-google:hover { background: var(--bg-elevated); }
    .si-google .g-icon { width: 20px; height: 20px; }
    .si-links { margin-top: 24px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .si-links a { font-size: 13px; color: var(--primary); text-decoration: none; }
    .si-links a:hover { text-decoration: underline; }
    .si-links .muted { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="si-page">
    <div class="si-topbar">
      <a href="index.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back
      </a>
      <div class="theme-toggle">
        <button onclick="document.documentElement.classList.remove('dark'); this.classList.add('active'); document.querySelector('.theme-toggle .dark-btn').classList.remove('active')" class="active light-btn" aria-label="Light mode">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
        <button onclick="document.documentElement.classList.add('dark'); this.classList.add('active'); document.querySelector('.theme-toggle .light-btn').classList.remove('active')" class="dark-btn" aria-label="Dark mode">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>

    <div class="si-body">
      <div class="logo">Along</div>
      <div class="heading">Welcome back</div>
      <div class="subtitle">Sign in to continue</div>

      <form class="si-form" onsubmit="event.preventDefault();">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" class="input" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input id="password" type="password" class="input" placeholder="Enter your password" autocomplete="current-password">
            <button type="button" class="toggle-vis" onclick="const i=document.getElementById('password');const e=this.querySelector('svg:first-child');const h=this.querySelector('svg:last-child');if(i.type==='password'){i.type='text';e.style.display='none';h.style.display='block'}else{i.type='password';e.style.display='block';h.style.display='none'}" aria-label="Toggle password visibility">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Sign In</button>
      </form>

      <div class="si-divider"><span>or continue with</span></div>

      <button class="si-google">
        <svg class="g-icon" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.54 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.87 7.35 2.56 10.56l7.98-5.97z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>

      <div class="si-links">
        <a href="#">Forgot password?</a>
        <div><span class="muted">Don't have an account?</span> <a href="#">Sign up</a></div>
      </div>
    </div>
  </div>

  <script>
    const html = document.documentElement;
    const t = localStorage.getItem('along-theme');
    if (t === 'dark') { html.classList.add('dark'); }
    document.querySelectorAll('.theme-toggle button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.theme-toggle button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        localStorage.setItem('along-theme', html.classList.contains('dark') ? 'dark' : 'light');
      });
    });
  </script>
</body>
</html>
